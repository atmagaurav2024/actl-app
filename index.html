const { useState, useEffect, useCallback } = React;

function sortUsers(users) {
  return [...users].sort((a,b) => {
    const la=a.losses||0, lb=b.losses||0;
    if(la!==lb) return la-lb;
    const wa=a.wins||0, wb=b.wins||0;
    if(wa!==wb) return wb-wa;
    return a.name.localeCompare(b.name);
  });
}

}

/* ─────────────────────────────────────────────
   QUALIFIER TAB — Interactive bracket
   IPL Rules:
   Q1: 1st vs 2nd  → Winner → Final, Loser → Q2
   EL: 3rd vs 4th  → Winner → Q2,    Loser → OUT
   Q2: Loser(Q1) vs Winner(EL) → Winner → Final, Loser → OUT
   Final: Winner(Q1) vs Winner(Q2) → CHAMPION
───────────────────────────────────────────── */
function QualifierTab({ users, seasonId, qualData, onSaveQual }) {
  const sorted = sortUsers(users);
  const top4 = sorted.slice(0,4);
  const has4 = top4.length >= 4;

  // qualData shape: { q1Winner, elWinner, q2Winner, finalWinner }
  const [q, setQ] = useState(qualData || {});
  const [saving, setSaving] = useState(false);

  useEffect(() => { setQ(qualData || {}); }, [qualData]);

  const save = async (newQ) => {
    setSaving(true);
    await onSaveQual(newQ);
    setSaving(false);
  };

  const pick = (key, player) => {
    const newQ = {...q, [key]: player};
    // cascade resets
    if(key==="q1Winner"||key==="elWinner") { delete newQ.q2Winner; delete newQ.finalWinner; }
    if(key==="q2Winner") { delete newQ.finalWinner; }
    setQ(newQ);
    save(newQ);
  };

  const reset = () => { const newQ={}; setQ(newQ); save(newQ); };

  const medalColors = ["#f59e0b","#94a3b8","#cd7f32","#3b82f6"];
  const medalLabels = ["1st","2nd","3rd","4th"];

  // Derive match participants
  const p = (i) => top4[i] || null;
  const q1Team1 = p(0), q1Team2 = p(1);
  const elTeam1 = p(2), elTeam2 = p(3);
  const q1Winner = q.q1Winner ? users.find(u=>u.id===q.q1Winner) : null;
  const q1Loser  = q.q1Winner ? (q.q1Winner===q1Team1?.id ? q1Team2 : q1Team1) : null;
  const elWinner = q.elWinner ? users.find(u=>u.id===q.elWinner) : null;
  const elLoser  = q.elWinner ? (q.elWinner===elTeam1?.id ? elTeam2 : elTeam1) : null;
  const q2Team1  = q1Loser, q2Team2 = elWinner;
  const q2Winner = q.q2Winner ? users.find(u=>u.id===q.q2Winner) : null;
  const q2Loser  = q.q2Winner ? (q.q2Winner===q2Team1?.id ? q2Team2 : q2Team1) : null;
  const fTeam1   = q1Winner, fTeam2 = q2Winner;
  const finalWinner = q.finalWinner ? users.find(u=>u.id===q.finalWinner) : null;

  const MatchCard = ({title,team1,team2,winnerKey,color,badge,locked}) => {
    const winner = q[winnerKey] ? users.find(u=>u.id===q[winnerKey]) : null;
    const canPlay = team1 && team2;
    return (
      <div style={{background:C.surface,borderRadius:14,border:`2px solid ${color}`,padding:16,marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{background:color,color:color==="#f59e0b"?"#000":"#fff",borderRadius:6,padding:"2px 10px",fontSize:12,fontWeight:700}}>{badge}</span>
            <span style={{fontFamily:"Rajdhani,sans-serif",fontSize:15,fontWeight:700,color:C.text}}>{title}</span>
          </div>
          {winner && !locked && <button onClick={()=>pick(winnerKey,null)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:11,padding:"2px 6px",borderRadius:4,border:`1px solid ${C.border}`}}>Reset</button>}
        </div>
        {!canPlay ? (
          <div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"8px 0"}}>Waiting for previous round…</div>
        ) : (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[team1,team2].map((t,i)=>{
              if(!t) return <div key={i}/>;
              const isWinner = winner?.id===t.id;
              const isLoser = winner && winner.id!==t.id;
              return (
                <button key={t.id} onClick={()=>!locked&&!winner&&pick(winnerKey,t.id)}
                  style={{background:isWinner?"#1a3a1a":isLoser?"#1a1a1a":C.card,
                    border:`2px solid ${isWinner?C.green:isLoser?"#334155":C.border}`,
                    borderRadius:10,padding:"12px 10px",cursor:locked||winner?"default":"pointer",
                    textAlign:"center",transition:"all .15s",opacity:isLoser?0.45:1}}>
                  <div style={{fontSize:14,fontWeight:600,color:isWinner?C.green:C.text,marginBottom:4}}>{t.name}</div>
                  <div style={{fontSize:11,color:C.muted}}>
                    <span style={{color:C.green}}>W{t.wins||0}</span> <span style={{color:C.accent2}}>L{t.losses||0}</span>
                  </div>
                  {isWinner && <div style={{marginTop:6,fontSize:11,color:C.green,fontWeight:600}}>✓ WINNER</div>}
                  {isLoser && <div style={{marginTop:6,fontSize:11,color:C.muted}}>eliminated</div>}
                  {!winner && !locked && <div style={{marginTop:6,fontSize:11,color:C.muted}}>tap to select</div>}
                </button>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{padding:16}}>
      {/* Top 4 standings */}
      <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:15,fontWeight:700,color:C.accent,marginBottom:10}}>Top 4 Standings</div>
      {!has4 && <div style={{color:C.muted,fontSize:13,marginBottom:16,background:C.surface,borderRadius:10,padding:"10px 14px",border:`1px solid ${C.border}`}}>Need at least 4 players. Currently {sorted.length} player{sorted.length!==1?"s":""}.</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:20}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{background:C.surface,borderRadius:10,padding:"10px 8px",border:`1px solid ${C.border}`,borderTop:`3px solid ${medalColors[i]}`,opacity:top4[i]?1:0.35}}>
            <div style={{fontSize:10,fontWeight:700,color:medalColors[i],marginBottom:3}}>{medalLabels[i]}</div>
            <div style={{fontSize:12,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{top4[i]?.name||"—"}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:3}}>
              <span style={{color:C.green}}>W{top4[i]?.wins||0}</span> <span style={{color:C.accent2}}>L{top4[i]?.losses||0}</span>
            </div>
          </div>
        ))}
      </div>

      {/* IPL Rules note */}
      <div style={{background:"#1a1f0f",border:`1px solid #2a3a1a`,borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:12,color:C.muted,lineHeight:1.6}}>
        <span style={{color:C.accent,fontWeight:600}}>IPL Qualifier Rules: </span>
        Q1 winner → directly to Final · Q1 loser plays Q2 · Eliminator winner plays Q2 · Eliminator loser = OUT · Q2 winner → Final · Q2 loser = OUT
      </div>

      {has4 && (
        <>
          {saving && <div style={{textAlign:"center",color:C.muted,fontSize:12,marginBottom:8}}>Saving…</div>}

          {/* ROUND 1 */}
          <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:13,fontWeight:700,color:C.muted,letterSpacing:2,marginBottom:8}}>ROUND 1</div>
          <MatchCard title="Qualifier 1" badge="Q1" color={C.green} team1={q1Team1} team2={q1Team2} winnerKey="q1Winner"/>
          <MatchCard title="Eliminator" badge="EL" color={C.accent2} team1={elTeam1} team2={elTeam2} winnerKey="elWinner"/>

          {/* ROUND 2 */}
          <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:13,fontWeight:700,color:C.muted,letterSpacing:2,marginBottom:8,marginTop:8}}>ROUND 2</div>
          <MatchCard title="Qualifier 2" badge="Q2" color={C.blue}
            team1={q2Team1} team2={q2Team2} winkerKey="q2Winner"
            winnerKey="q2Winner"
            locked={!q1Winner||!elWinner}/>

          {/* FINAL */}
          <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:13,fontWeight:700,color:C.muted,letterSpacing:2,marginBottom:8,marginTop:8}}>FINAL</div>
          <MatchCard title="Final" badge="F" color={C.accent}
            team1={fTeam1} team2={fTeam2} winkerKey="finalWinner"
            winnerKey="finalWinner"
            locked={!q2Winner}/>

          {/* Champion */}
          {finalWinner && (
            <div style={{background:"linear-gradient(135deg,#1f1a08,#2a2010)",border:`2px solid ${C.accent}`,borderRadius:16,padding:20,textAlign:"center",marginTop:8}}>
              <div style={{fontSize:32,marginBottom:6}}>🏆</div>
              <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:24,fontWeight:700,color:C.accent,letterSpacing:2}}>CHAMPION</div>
              <div style={{fontSize:20,fontWeight:600,color:C.text,marginTop:6}}>{finalWinner.name}</div>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>W{finalWinner.wins||0} · L{finalWinner.losses||0}</div>
            </div>
          )}

          {/* Eliminated players summary */}
          {(elLoser || q2Loser) && (
            <div style={{marginTop:16}}>
              <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:13,fontWeight:700,color:C.muted,letterSpacing:2,marginBottom:8}}>ELIMINATED</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {elLoser && <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 14px",fontSize:13,color:C.muted}}>{elLoser.name} <span style={{color:C.accent2}}>— After Eliminator</span></div>}
                {q2Loser && <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 14px",fontSize:13,color:C.muted}}>{q2Loser.name} <span style={{color:C.accent2}}>— After Q2</span></div>}
              </div>
            </div>
          )}

          <button onClick={reset} style={{marginTop:16,background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer",width:"100%"}}>🔄 Reset Bracket</button>
        </>
      )}
    </div>
  );
}

  const [user,setUser] = useState(""); const [pass,setPass] = useState(""); const [err,setErr] = useState("");

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,background:C.bg}}>

        <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:52,fontWeight:700,color:C.accent,letterSpacing:8}}>ACTL</div>

          <button style={{padding:"16px 32px",background:C.card,border:`2px solid ${C.blue}`,color:C.blue,borderRadius:12,fontSize:16,fontWeight:600,cursor:"pointer"}} onClick={()=>onLogin("user")}>👤 Continue as User</button>
        </div>
      )}
      {mode==="admin" && (
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24,width:"100%",maxWidth:360}}>
          <div style={{fontSize:16,fontWeight:600,marginBottom:20,color:C.text}}>Admin Login</div>
          <label style={{fontSize:13,color:C.muted,display:"block",marginBottom:6}}>Username</label>
          <input style={{...iS,marginBottom:14}} value={user} onChange={e=>{setUser(e.target.value);setErr("");}} placeholder="Username"/>
          <label style={{fontSize:13,color:C.muted,display:"block",marginBottom:6}}>Password</label>
          <input style={{...iS,marginBottom:18}} type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr("");}} placeholder="Password" onKeyDown={e=>e.key==="Enter"&&go()}/>
          {err && <div style={{color:"#ef4444",fontSize:13,marginBottom:12}}>{err}</div>}
          <div style={{display:"flex",gap:10}}>
            <button style={{flex:1,background:C.accent,color:"#000",border:"none",borderRadius:8,padding:"12px 16px",fontWeight:600,cursor:"pointer",fontSize:15}} onClick={go}>Login</button>
            <button style={{background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 16px",cursor:"pointer",fontSize:15}} onClick={()=>{setMode(null);setErr("");setUser("");setPass("");}}>Back</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────────
   MAIN APP
───────────────────────────────────────────── */
function App() {
  const [role,setRole] = useState(null);
  const [contests,setContests] = useState([]);
  const [selContest,setSelContest] = useState(null);
  const [selSeason,setSelSeason] = useState(null);
  const [activeTab,setActiveTab] = useState("points");
  const [loading,setLoading] = useState(false);
  const [saving,setSaving] = useState(false);
  const [showCC,setShowCC] = useState(false);
  const [showCS,setShowCS] = useState(false);
  const [cName,setCName] = useState("");
  const [sName,setSName] = useState("");
  const [newUN,setNewUN] = useState("");
  const [sUsers,setSUsers] = useState([]);
  const [delConf,setDelConf] = useState(null);

  const isAdmin = role==="admin";
  const contest = contests.find(c=>c.id===selContest);
  const season = contest?.seasons?.find(s=>s.id===selSeason);

  const fetchAll = useCallback(async () => {
    setLoading(true);
    const [{data:cR},{data:sR},{data:pR},{data:mR},{data:eR},{data:qR}] = await Promise.all([
      sb.from("contests").select("*").order("created_at"),
      sb.from("seasons").select("*").order("created_at"),
      sb.from("players").select("*"),
      sb.from("milestone_table").select("*"),
      sb.from("closest_escape").select("*").order("sort_order"),
      sb.from("qualifier_data").select("*"),
    ]);
    const built = (cR||[]).map(c=>({
      ...c,
      seasons:(sR||[]).filter(s=>s.contest_id===c.id).map(s=>({
        ...s,
        users:(pR||[]).filter(p=>p.season_id===s.id),
        qualData: (qR||[]).find(q=>q.season_id===s.id)?.data || {},
        stats:{
          milestoneTable:(mR||[]).filter(m=>m.season_id===s.id),
          closestEscape:(eR||[]).filter(e=>e.season_id===s.id),
        }
      }))
    }));
    setContests(built);
    setLoading(false);
  },[]);

  useEffect(()=>{ if(role) fetchAll(); },[role]);

  const createContest = async () => {
    if(!cName.trim()) return; setSaving(true);
    const {data} = await sb.from("contests").insert({name:cName.trim()}).select().single();
    if(data){setSelContest(data.id);setSelSeason(null);}
    setCName(""); setShowCC(false); await fetchAll(); setSaving(false);
  };

  const deleteContest = async (id) => {
    await sb.from("contests").delete().eq("id",id);
    if(selContest===id){setSelContest(null);setSelSeason(null);}
    await fetchAll();
  };

  const createSeason = async () => {
    if(!sName.trim()||!selContest) return; setSaving(true);
    const {data:s} = await sb.from("seasons").insert({contest_id:selContest,name:sName.trim()}).select().single();
    if(s && sUsers.length>0){
      const {data:players} = await sb.from("players").insert(sUsers.map(u=>({season_id:s.id,name:u,wins:0,losses:0}))).select();
      if(players?.length) await sb.from("milestone_table").insert(players.map(p=>({season_id:s.id,player_id:p.id,times:0})));
    }
    if(s) setSelSeason(s.id);
    setSName(""); setSUsers([]); setShowCS(false); await fetchAll(); setSaving(false);
  };

  const deleteSeason = async (sid) => {
    await sb.from("seasons").delete().eq("id",sid);
    if(selSeason===sid) setSelSeason(null);
    await fetchAll();
  };

  const updateWL = async (pid,field,val) => {
    await sb.from("players").update({[field]:Math.max(0,parseInt(val)||0)}).eq("id",pid);
    await fetchAll();
  };

  const updateMilestone = async (id,val) => {
    await sb.from("milestone_table").update({times:Math.max(0,parseInt(val)||0)}).eq("id",id);
    await fetchAll();
  };

  const addCERow = async () => {
    await sb.from("closest_escape").insert({season_id:selSeason,entry:"",sort_order:(season?.stats?.closestEscape||[]).length});
    await fetchAll();
  };

  const updateCE = async (ceId,val) => {
    await sb.from("closest_escape").update({entry:val}).eq("id",ceId);
    setContests(prev=>prev.map(c=>c.id!==selContest?c:{...c,seasons:c.seasons.map(s=>s.id!==selSeason?s:{...s,stats:{...s.stats,closestEscape:s.stats.closestEscape.map(e=>e.id===ceId?{...e,entry:val}:e)}})}));
  };

  const deleteCERow = async (ceId) => {
    await sb.from("closest_escape").delete().eq("id",ceId);
    await fetchAll();
  };

  const saveQualData = async (data) => {
    const existing = await sb.from("qualifier_data").select("id").eq("season_id",selSeason).single();
    if(existing.data) {
      await sb.from("qualifier_data").update({data}).eq("season_id",selSeason);
    } else {
      await sb.from("qualifier_data").insert({season_id:selSeason,data});
    }
    await fetchAll();
  };

  if(!role) return <LoginPage onLogin={r=>setRole(r)}/>;

  const sortedUsers = season ? sortUsers(season.users) : [];
  // Stats milestone sorted ascending by times
  const sortedMilestone = season ? [...(season.stats?.milestoneTable||[])].sort((a,b)=>(a.times||0)-(b.times||0)) : [];

  const iS = {background:C.bg,border:`1px solid ${C.border}`,color:C.text,padding:"12px 14px",borderRadius:8,fontSize:16,fontFamily:"Inter,sans-serif",width:"100%",outline:"none",boxSizing:"border-box"};
  const niS = {background:C.bg,border:`1px solid ${C.border}`,color:C.text,padding:"6px 8px",borderRadius:6,width:68,fontSize:16,textAlign:"center",outline:"none"};
  const thS = {textAlign:"left",padding:"10px 12px",fontSize:11,color:C.muted,fontWeight:500,textTransform:"uppercase",letterSpacing:".05em",borderBottom:`1px solid ${C.border}`};
  const tdS = {padding:"12px 12px",fontSize:15,borderBottom:`1px solid ${C.border}`};
  const mo = {position:"fixed",inset:0,background:"rgba(0,0,0,.8)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100,padding:0};
  const md = {background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px 16px 0 0",padding:24,width:"100%",maxWidth:500};

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"Inter,sans-serif"}}>

      {/* Header */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:26,fontWeight:700,color:C.accent,letterSpacing:4}}>ACTL</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {saving && <span style={{fontSize:11,color:C.muted}}>Saving…</span>}
          <span style={{display:"inline-block",padding:"3px 10px",borderRadius:12,fontSize:11,fontWeight:600,background:isAdmin?"#451a0366":"#1e3a5f66",color:isAdmin?C.accent:C.blue}}>{isAdmin?"👑 Admin":"👤 User"}</span>
          <button style={{background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",fontSize:13,cursor:"pointer"}} onClick={()=>{setRole(null);setSelContest(null);setSelSeason(null);}}>Logout</button>
        </div>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:16}}>
        {loading ? <Spinner/> : (
          <>
            {/* Contests */}
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:500,textTransform:"uppercase",letterSpacing:1}}>Contests</div>
                {isAdmin && <button style={{background:C.accent,color:"#000",border:"none",borderRadius:8,padding:"8px 16px",fontSize:14,fontWeight:600,cursor:"pointer"}} onClick={()=>setShowCC(true)}>+ Create Contest</button>}
              </div>
              <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:6}}>
                {contests.length===0 && <div style={{color:C.muted,fontSize:14,padding:"14px 0"}}>No contests yet.{isAdmin?" Create one!":""}</div>}
                {contests.map(c=>(
                  <div key={c.id} onClick={()=>{setSelContest(c.id);setSelSeason(null);}} style={{minWidth:160,background:selContest===c.id?"#1c2416":C.card,border:`1px solid ${selContest===c.id?C.accent:C.border}`,borderRadius:12,padding:"14px 16px",cursor:"pointer",flexShrink:0}}>
                    <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>{c.name}</div>
                    <div style={{fontSize:12,color:C.muted}}>{c.seasons?.length||0} season{c.seasons?.length!==1?"s":""}</div>
                    {isAdmin && <button onClick={e=>{e.stopPropagation();setDelConf({type:"contest",id:c.id,name:c.name});}} style={{marginTop:10,background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:12,padding:0}}>🗑 Delete</button>}
                  </div>
                ))}
              </div>
            </div>

            {/* Seasons */}
            {contest && (
              <div style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div>
                    <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:20,fontWeight:700}}>{contest.name}</div>
                    <div style={{fontSize:12,color:C.muted}}>Select a season</div>
                  </div>
                  {isAdmin && <button style={{background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:14,cursor:"pointer",fontWeight:600}} onClick={()=>setShowCS(true)}>+ New Season</button>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}}>
                  {contest.seasons?.length===0 && <div style={{color:C.muted,fontSize:14}}>No seasons yet.{isAdmin?" Create one!":""}</div>}
                  {contest.seasons?.map(s=>(
                    <div key={s.id} onClick={()=>setSelSeason(s.id)} style={{background:C.card,border:`1px solid ${selSeason===s.id?C.accent:C.border}`,borderRadius:12,padding:"14px 16px",cursor:"pointer"}}>
                      <div style={{fontSize:15,fontWeight:600}}>{s.name}</div>
                      <div style={{fontSize:12,color:C.muted,marginTop:4}}>{s.users?.length||0} players</div>
                      {isAdmin && <button onClick={e=>{e.stopPropagation();setDelConf({type:"season",id:s.id,name:s.name});}} style={{marginTop:10,background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:12,padding:0}}>🗑 Delete</button>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Season Detail */}
            {season && (
              <div style={{background:C.card,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden"}}>
                <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`,background:C.surface}}>
                  <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:18,fontWeight:700,color:C.accent}}>{season.name}</div>
                  <div style={{fontSize:12,color:C.muted,marginTop:2}}>Season · {contest?.name}</div>
                </div>
                <div style={{padding:"10px 12px",display:"flex",gap:6,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
                  {["points","stats","qualifier"].map(t=>(
                    <button key={t} onClick={()=>setActiveTab(t)} style={{padding:"10px 18px",borderRadius:8,fontSize:14,fontWeight:500,cursor:"pointer",border:"none",background:activeTab===t?C.accent:"transparent",color:activeTab===t?"#000":C.muted,whiteSpace:"nowrap"}}>
                      {t==="points"?"Points Table":t==="stats"?"Stats":"Qualifier"}
                    </button>
                  ))}
                </div>

                {/* Points Table */}
                {activeTab==="points" && (
                  <div style={{paddingBottom:8}}>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead><tr>{["#","Player","L","W"].map(h=><th key={h} style={thS}>{h}</th>)}</tr></thead>
                      <tbody>
                        {sortedUsers.map((u,i)=>(
                          <tr key={u.id}>
                            <td style={{...tdS,color:C.muted,width:36}}>{i+1}</td>
                            <td style={{...tdS,fontWeight:500}}>{u.name}</td>
                            <td style={tdS}>{isAdmin?<input type="number" style={niS} defaultValue={u.losses||0} onBlur={e=>updateWL(u.id,"losses",e.target.value)} min={0}/>:<span style={{color:"#ef4444",fontWeight:600}}>{u.losses||0}</span>}</td>
                            <td style={tdS}>{isAdmin?<input type="number" style={niS} defaultValue={u.wins||0} onBlur={e=>updateWL(u.id,"wins",e.target.value)} min={0}/>:<span style={{color:C.green,fontWeight:600}}>{u.wins||0}</span>}</td>
                          </tr>
                        ))}
                        {sortedUsers.length===0 && <tr><td colSpan={4} style={{...tdS,color:C.muted,textAlign:"center",padding:20}}>No players in this season.</td></tr>}
                      </tbody>
                    </table>
                  </div>
                )}

                {/* Stats */}
                {activeTab==="stats" && (
                  <div style={{padding:16}}>
                    <div style={{marginBottom:24}}>
                      <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:15,fontWeight:700,color:C.accent,marginBottom:10}}>Players to Score More Than 1000 Points</div>
                      <div style={{background:C.surface,borderRadius:12,overflow:"hidden",border:`1px solid ${C.border}`}}>
                        <table style={{width:"100%",borderCollapse:"collapse"}}>
                          <thead><tr><th style={thS}>Player Name</th><th style={thS}>Times ↑</th></tr></thead>
                          <tbody>
                            {sortedMilestone.map(row=>(
                              <tr key={row.id}>
                                <td style={{...tdS,fontWeight:500}}>{season.users.find(u=>u.id===row.player_id)?.name||"—"}</td>
                                <td style={tdS}>{isAdmin?<input type="number" style={niS} defaultValue={row.times||0} min={0} onBlur={e=>updateMilestone(row.id,e.target.value)}/>:<span style={{fontWeight:600,color:C.blue}}>{row.times||0}</span>}</td>
                              </tr>
                            ))}
                            {sortedMilestone.length===0 && <tr><td colSpan={2} style={{...tdS,color:C.muted,textAlign:"center"}}>No players yet.</td></tr>}
                          </tbody>
                        </table>
                      </div>
                    </div>
                    <div>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                        <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:15,fontWeight:700,color:C.accent}}>Closest Escape</div>
                        {isAdmin && <button style={{background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,padding:"6px 14px",cursor:"pointer"}} onClick={addCERow}>+ Add Row</button>}
                      </div>
                      <div style={{background:C.surface,borderRadius:12,overflow:"hidden",border:`1px solid ${C.border}`}}>
                        <table style={{width:"100%",borderCollapse:"collapse"}}>
                          <thead><tr><th style={thS}>Entry</th>{isAdmin&&<th style={{...thS,width:44}}></th>}</tr></thead>
                          <tbody>
                            {(season.stats?.closestEscape||[]).map(row=>(
                              <tr key={row.id}>
                                <td style={tdS}>{isAdmin?<input style={{...iS,padding:"6px 10px",fontSize:15}} defaultValue={row.entry} onBlur={e=>updateCE(row.id,e.target.value)} placeholder="Enter entry..."/>:row.entry||"—"}</td>
                                {isAdmin && <td style={tdS}><button onClick={()=>setDelConf({type:"ce",id:row.id,name:row.entry||"this entry"})} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18,padding:"4px 8px"}}>✕</button></td>}
                              </tr>
                            ))}
                            {(season.stats?.closestEscape||[]).length===0 && <tr><td colSpan={isAdmin?2:1} style={{...tdS,color:C.muted,textAlign:"center"}}>No entries yet.{isAdmin?" Click + Add Row.":""}</td></tr>}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

                {/* Qualifier */}
                {activeTab==="qualifier" &&
                  <QualifierTab
                    users={season.users}
                    seasonId={selSeason}
                    qualData={season.qualData}
                    onSaveQual={saveQualData}
                  />
                }
              </div>
            )}
          </>
        )}
      </div>

      {/* Create Contest Modal — bottom sheet */}
      {showCC && (
        <div onClick={()=>setShowCC(false)} style={mo}>
          <div onClick={e=>e.stopPropagation()} style={md}>
            <div style={{width:40,height:4,background:C.border,borderRadius:4,margin:"0 auto 20px"}}/>
            <div style={{fontSize:16,fontWeight:600,marginBottom:20}}>Create Contest</div>
            <label style={{fontSize:13,color:C.muted,display:"block",marginBottom:6}}>Contest Name</label>
            <input style={iS} value={cName} onChange={e=>setCName(e.target.value)} placeholder="e.g. IPL 2025 Office League" onKeyDown={e=>e.key==="Enter"&&createContest()} autoFocus/>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button style={{flex:1,background:C.accent,color:"#000",border:"none",borderRadius:8,padding:"12px 16px",fontWeight:600,cursor:"pointer",fontSize:15}} onClick={createContest}>Create</button>
              <button style={{background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 16px",cursor:"pointer",fontSize:15}} onClick={()=>{setShowCC(false);setCName("");}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Create Season Modal — bottom sheet */}
      {showCS && (
        <div onClick={()=>setShowCS(false)} style={mo}>
          <div onClick={e=>e.stopPropagation()} style={{...md,maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{width:40,height:4,background:C.border,borderRadius:4,margin:"0 auto 20px"}}/>
            <div style={{fontSize:16,fontWeight:600,marginBottom:20}}>Create Season</div>
            <label style={{fontSize:13,color:C.muted,display:"block",marginBottom:6}}>Season Name</label>
            <input style={{...iS,marginBottom:18}} value={sName} onChange={e=>setSName(e.target.value)} placeholder="e.g. Season 1" autoFocus/>
            <label style={{fontSize:13,color:C.muted,display:"block",marginBottom:8}}>Players</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10,minHeight:36}}>
              {sUsers.map((u,i)=>(<span key={i} style={{display:"inline-flex",alignItems:"center",background:"#1e293b",color:C.muted,fontSize:13,padding:"6px 12px",borderRadius:20,gap:6}}>{u}<span style={{cursor:"pointer",color:"#ef4444",fontSize:16}} onClick={()=>setSUsers(p=>p.filter((_,j)=>j!==i))}>✕</span></span>))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input style={iS} value={newUN} onChange={e=>setNewUN(e.target.value)} placeholder="Player name" onKeyDown={e=>{if(e.key==="Enter"&&newUN.trim()){setSUsers(p=>[...p,newUN.trim()]);setNewUN("");}}}/>
              <button style={{background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"12px 18px",cursor:"pointer",fontWeight:600,fontSize:18}} onClick={()=>{if(newUN.trim()){setSUsers(p=>[...p,newUN.trim()]);setNewUN("");}}} >+</button>
            </div>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button style={{flex:1,background:C.accent,color:"#000",border:"none",borderRadius:8,padding:"12px 16px",fontWeight:600,cursor:"pointer",opacity:!sName.trim()?0.5:1,fontSize:15}} onClick={createSeason} disabled={!sName.trim()}>Save Season</button>
              <button style={{background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 16px",cursor:"pointer",fontSize:15}} onClick={()=>{setShowCS(false);setSName("");setSUsers([]);setNewUN("");}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Delete Confirm with Password */}
      {delConf && (
        <DeleteConfirm
          item={delConf}
          onCancel={()=>setDelConf(null)}
          onConfirm={async ()=>{
            if(delConf.type==="contest") await deleteContest(delConf.id);
            else if(delConf.type==="season") await deleteSeason(delConf.id);
            else if(delConf.type==="ce") await deleteCERow(delConf.id);
            setDelConf(null);
          }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
